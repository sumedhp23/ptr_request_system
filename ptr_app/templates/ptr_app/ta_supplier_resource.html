{% extends "ptr_app/base.html" %}

{% block title %}Supplier Resource — Tooling Admin{% endblock %}
{% block breadcrumb %}Tooling Admin / Supplier Resource{% endblock %}

{% block content %}
<div class="page-header approval-header" style="margin-bottom: 24px;">
    <h2 class="page-title" style="color: #64748b; font-weight: 500;">SUPPLIER RESOURCE</h2>
</div>

<div class="card form-card" style="padding: 0; box-shadow: none; border: 1px solid var(--clr-border); max-width: 600px;">
    <div style="padding: 12px 16px; background-color: #f8fafc; border-bottom: 1px solid var(--clr-border);">
        <span style="font-size: 13px; font-weight: 600; color: #64748b;">Add New Supplier Resource</span>
    </div>
    <div style="padding: 24px;">
        <form method="post" action="javascript:void(0);" onsubmit="alert('Dummy Data successfully staged to DB queue!'); this.reset();">
            <div style="display: flex; flex-direction: column; gap: 20px;">
                <div class="form-group-compact">
                    <label style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase;">First Name</label>
                    <input type="text" class="form-control" placeholder="Enter first name..." required>
                </div>
                
                <div class="form-group-compact">
                    <label style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase;">Last Name</label>
                    <input type="text" class="form-control" placeholder="Enter last name..." required>
                </div>

                <div class="form-group-compact">
                    <label style="font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase;">Email Address</label>
                    <input type="email" class="form-control" placeholder="supplier@example.com" required>
                </div>
                
                <div style="margin-top: 12px; text-align: right; border-top: 1px solid var(--clr-border); padding-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="background-color: #3b82f6; border-color: #3b82f6; padding: 10px 32px; font-weight: 500;">
                        <span class="material-icons-outlined" style="font-size: 16px; vertical-align: middle; margin-right: 6px;">add</span>Add Supplier
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
